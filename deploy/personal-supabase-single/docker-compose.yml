services:
  happy-server:
    image: ${IMAGE}
    container_name: happy-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      PUBLIC_URL: ${PUBLIC_URL}
      HANDY_MASTER_SECRET: ${HANDY_MASTER_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - happy-data:/data
    expose:
      - "3005"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2.10-alpine
    container_name: happy-caddy
    restart: unless-stopped
    depends_on:
      happy-server:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  happy-data:
  caddy-data:
  caddy-config:
