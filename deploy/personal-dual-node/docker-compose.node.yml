services:
  happy-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: happy-personal-server:latest
    container_name: happy-server-${NODE_NAME}
    init: true
    restart: unless-stopped
    ports:
      - "${PORT:-3005}:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      PUBLIC_URL: ${PUBLIC_URL}
      HAPPY_NODE_ID: ${HAPPY_NODE_ID}
      HAPPY_NODE_REGION: ${HAPPY_NODE_REGION}
      HAPPY_NODE_ROLE: ${HAPPY_NODE_ROLE:-app}
      HANDY_MASTER_SECRET: ${HANDY_MASTER_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_HOST: ${S3_HOST}
      S3_PORT: ${S3_PORT}
      S3_USE_SSL: ${S3_USE_SSL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 20s
