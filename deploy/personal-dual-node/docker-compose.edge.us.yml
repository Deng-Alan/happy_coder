services:
  caddy:
    image: caddy:2.10-alpine
    container_name: happy-edge-us
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.us:/etc/caddy/Caddyfile:ro
      - happy-caddy-us-data:/data
      - happy-caddy-us-config:/config

volumes:
  happy-caddy-us-data:
  happy-caddy-us-config:
